<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>門徒培育系統 - 視覺與雷達圖完美對位測試</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { background-color: #f4f6f9; padding: 20px; font-family: '微軟正黑體', sans-serif; }
    .preview-card { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
  </style>
</head>
<body>

<div class="container">
  <h4 class="text-center text-primary fw-bold mb-5">門徒培育系統 - 視覺完美對位預覽 (上, 右, 下, 左)</h4>
  
  <div class="row justify-content-center">
    
    <div class="col-md-6 col-lg-5">
      <div class="preview-card text-center h-100">
        <h5 class="fw-bold mb-4" style="color: #2c3e50;">一領一 門徒培育系統</h5>
        
        <svg viewBox="0 0 400 400" width="100%" height="auto" style="max-width: 380px; filter: drop-shadow(0px 8px 12px rgba(0,0,0,0.15));">
          <defs>
            <linearGradient id="gradRed" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#e74c3c"/><stop offset="100%" stop-color="#c0392b"/></linearGradient>
            <linearGradient id="gradGreen" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#2ecc71"/><stop offset="100%" stop-color="#218838"/></linearGradient>
            <linearGradient id="gradOrange" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#f39c12"/><stop offset="100%" stop-color="#d68910"/></linearGradient>
            <linearGradient id="gradPurple" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#9b59b6"/><stop offset="100%" stop-color="#8e44ad"/></linearGradient>
            
            <path id="arrow_shape" d="M -25 -50 L -25 -95 L -45 -95 L 0 -160 L 45 -95 L 25 -95 L 25 -50 Z" />
          </defs>

          <g transform="translate(200,200)">
            
            <circle cx="0" cy="0" r="130" fill="rgba(44, 62, 80, 0.05)" stroke="#fff" stroke-width="2"/>
            <text x="0" y="-120" font-size="12" font-weight="bold" fill="rgba(44, 62, 80, 0.5)" text-anchor="middle">門徒培育場</text>
            
            <g id="growth_disciple_icon" transform="scale(1.2)">
              <circle cx="0" cy="-20" r="10" fill="#2c3e50"/> <path d="M -15 10 Q 0 -5, 15 10 V -15 Q 0 -25, -15 -15 Z" fill="#2c3e50"/> 
              <path d="M -5 15 L 0 25 L 5 15" fill="none" stroke="#2c3e50" stroke-width="2"/>
            </g>

            <circle cx="0" cy="0" r="35" fill="#fff" stroke="#2c3e50" stroke-width="2"/>

            <use href="#arrow_shape" fill="url(#gradRed)" />
            <circle cx="0" cy="-90" r="30" fill="#fff" stroke="#c0392b" stroke-width="4"/>
            <text x="0" y="-83" font-size="20" font-weight="bold" fill="#c0392b" text-anchor="middle">服事</text>
            <text x="0" y="-170" font-size="14" font-weight="bold" fill="#c0392b" text-anchor="middle">參與事奉</text>

            <use href="#arrow_shape" fill="url(#gradGreen)" transform="rotate(90)" />
            <circle cx="90" cy="0" r="30" fill="#fff" stroke="#218838" stroke-width="4"/>
            <text x="90" y="7" font-size="20" font-weight="bold" fill="#218838" text-anchor="middle">造就</text>
            <text x="160" y="5" font-size="14" font-weight="bold" fill="#218838" text-anchor="start">靈命培育</text>

            <use href="#arrow_shape" fill="url(#gradOrange)" transform="rotate(180)" />
            <circle cx="0" cy="90" r="30" fill="#fff" stroke="#d68910" stroke-width="4"/>
            <text x="0" y="97" font-size="20" font-weight="bold" fill="#d68910" text-anchor="middle">尋羊</text>
            <text x="0" y="180" font-size="14" font-weight="bold" fill="#d68910" text-anchor="middle">建立關係</text>

            <use href="#arrow_shape" fill="url(#gradPurple)" transform="rotate(270)" />
            <circle cx="-90" cy="0" r="30" fill="#fff" stroke="#8e44ad" stroke-width="4"/>
            <text x="-90" y="7" font-size="20" font-weight="bold" fill="#8e44ad" text-anchor="middle">見證</text>
            <text x="-160" y="5" font-size="14" font-weight="bold" fill="#8e44ad" text-anchor="end">宣揚福音</text>
            
          </g>
        </svg>

      </div>
    </div>

    <div class="col-md-6 col-lg-5">
      <div class="preview-card text-center h-100">
        <h5 class="fw-bold mb-4" style="color: #2c3e50;">門徒均衡度分析 (上, 右, 下, 左)</h5>
        <div style="position: relative; height: 320px; width: 100%;">
          <canvas id="radarChart"></canvas>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
  // 雷達圖繪製邏輯
  document.addEventListener("DOMContentLoaded", function() {
    const ctx = document.getElementById('radarChart').getContext('2d');
    
    // 模擬使用者資料
    const mockData = {
      '服事': 5, // 服事課程/參與事奉 (Red)
      '造就': 8, // 信徒課程/靈命培育 (Green)
      '尋羊': 3, // 一般活動/建立關係 (Orange)
      '見證': 6  // 福音活動/宣揚福音 (Purple)
    };

    // 【完全對位核心】
    // Chart.js 0度是正上方 A 順時針畫 A 陣列必須是：[上 A 右 A 下 A 左]
    const labels = [
      '服事课程 (參與事奉)', 
      '造就课程 (靈命培育)', 
      '尋羊活动 (建立關係)', 
      '見證活动 (宣揚福音)'
    ];
    const values = [mockData['服事'], mockData['造就'], mockData['尋羊'], mockData['見證']];

    new Chart(ctx, {
      type: 'radar',
      data: {
        labels: labels,
        datasets: [{
          label: '參與次數',
          data: values,
          backgroundColor: 'rgba(52, 152, 219, 0.2)',
          borderColor: '#3498db',
          borderWidth: 2,
          // 設定頂點專屬顏色 (紅 A 綠 A 橘 A 紫)
          pointBackgroundColor: ['#dc3545', '#28a745', '#f39c12', '#9b59b6'],
          pointBorderColor: '#fff',
          pointRadius: 6,
          pointHoverRadius: 8
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: {
          r: {
            startAngle: 0, // 確保正上方是第一個資料點
            angleLines: { color: 'rgba(0, 0, 0, 0.15)' },
            grid: { color: 'rgba(0, 0, 0, 0.1)' },
            pointLabels: {
              font: { size: 14, family: '微軟正黑體', weight: 'bold' },
              color: function(context) {
                // 文字配合四大顏色
                const colors = ['#dc3545', '#28a745', '#f39c12', '#9b59b6'];
                return colors[context.index];
              }
            },
            ticks: { display: false, stepSize: 2 } 
          }
        },
        plugins: {
          legend: { display: false }
        }
      }
    });
  });
</script>

</body>
</html>
