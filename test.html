<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>進階功能與儀式感動畫測試</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    body { background-color: #f4f6f9; font-family: '微軟正黑體', sans-serif; padding-bottom: 50px; }
    .card { border-radius: 15px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    
    /* ==========================================
       代禱儀式感動畫專屬 CSS
       ========================================== */
    #ritual-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      /* 從底部的寧靜藍漸變到頂部的神聖白光 */
      background: radial-gradient(circle at 50% 20%, #ffffff 0%, #87ceeb 70%, #2c3e50 100%);
      z-index: 10500; display: none; flex-direction: column; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 1s ease-in-out;
    }
    
    .ritual-content {
      position: absolute; bottom: 15%; text-align: center;
      /* 白鴿飛向光明的動畫：向上移動並縮小 */
      animation: flyToLight 5s ease-in-out forwards;
    }
    
    /* 祈禱文字 */
    .prayer-text-display {
      font-size: 1.2rem; color: #fff; font-style: italic; max-width: 80%; margin: 0 auto;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
      transition: opacity 1s; opacity: 1;
    }
    
    /* 白鴿 Icon */
    .dove-icon {
      font-size: 5rem; color: white; opacity: 0; transition: opacity 1s;
      filter: drop-shadow(0 0 15px rgba(255,255,255,1));
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    }

    /* 羅馬書經文 */
    .scripture-text {
      position: absolute; top: 40%; text-align: center; width: 100%;
      font-size: 1.6rem; font-weight: bold; color: #2c3e50;
      text-shadow: 0 0 15px rgba(255,255,255,0.8);
      opacity: 0; transform: translateY(20px);
    }
    
    /* 動畫設定 */
    @keyframes flyToLight {
      0%   { transform: translateY(0) scale(1); }
      100% { transform: translateY(-60vh) scale(0.2); }
    }
    .scripture-show { animation: fadeUpIn 2s 3.5s forwards; }
    @keyframes fadeUpIn {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div id="ritual-overlay">
  <div class="ritual-content" id="ritual-anim-container">
    <div class="prayer-text-display" id="ritual-prayer-text">"主啊，求您保守..."</div>
    <i class="fas fa-dove dove-icon" id="ritual-dove"></i>
  </div>
  <div class="scripture-text scripture-show" id="ritual-scripture">
    「聖靈親自用說不出來的歎息<br>替我們禱告。」<br>
    <span style="font-size: 1rem; font-weight: normal; margin-top: 10px; display: inline-block;">— 羅馬書 8:26 —</span>
  </div>
</div>

<div class="container mt-4">
  <h4 class="text-center fw-bold mb-4 text-primary">UI / UX 與動畫測試區</h4>

  <div class="card p-4 mb-5">
    <h5 class="mb-3 fw-bold text-dark"><i class="fas fa-praying-hands text-primary"></i> 測試代禱儀式感</h5>
    <textarea class="form-control mb-3" id="test-prayer-input" rows="3" placeholder="輸入您的代禱事項，然後按下送出..."></textarea>
    <button class="btn btn-primary rounded-pill py-2" onclick="testSubmitPrayer()">送出代禱</button>
  </div>

  <div class="card p-4 mb-5 bg-light">
    <h5 class="mb-3 fw-bold text-dark"><i class="fas fa-calendar-alt text-success"></i> 測試活動卡片升級</h5>
    
    <div class="card p-3 shadow-sm border-0 mb-3" style="border-left: 5px solid #9b59b6;">
      <div class="d-flex justify-content-between align-items-start">
        <div>
          <span class="badge mb-2" style="background-color: #9b59b6;">福音活動</span>
          <h5 class="fw-bold mb-1 text-dark">
            2026 兒童夏令營
            <span class="badge bg-danger ms-2 align-middle" style="font-size:0.75rem;"><i class="fas fa-fire"></i> 剩 5 名</span>
          </h5>
          <div class="text-muted" style="font-size: 0.85rem;"><i class="far fa-calendar-alt w-20px"></i> 2026/07/15 ~ 07/18</div>
        </div>
        
        <div class="text-end">
          <div class="text-danger fw-bold mb-1" style="font-size: 0.8rem; animation: pulse 2s infinite;">
            <i class="fas fa-hourglass-half"></i> 剩餘 3 天
          </div>
          <button class="btn btn-sm rounded-pill px-4 text-white" style="background-color: #9b59b6;">報名</button>
          
          <div class="mt-2">
            <a href="#" onclick="shareToLine('2026 兒童夏令營', 'E2026001')" class="text-success text-decoration-none fw-bold" style="font-size:0.85rem;">
              <i class="fab fa-line fa-lg"></i> 邀請朋友
            </a>
          </div>
        </div>
      </div>
    </div>

    <div class="card p-3 shadow-sm border-0 mb-3" style="border-left: 5px solid #28a745;">
      <div class="d-flex justify-content-between align-items-start">
        <div>
          <span class="badge mb-2" style="background-color: #28a745;">信徒課程</span>
          <h5 class="fw-bold mb-1 text-dark">
            春季成人主日學
            </h5>
          <div class="text-muted" style="font-size: 0.85rem;"><i class="far fa-calendar-alt w-20px"></i> 2026/04/01 ~ 06/30</div>
        </div>
        
        <div class="text-end">
          <div class="text-danger fw-bold mb-1" style="font-size: 0.8rem;">
            <i class="fas fa-exclamation-circle"></i> 今日截止
          </div>
          <button class="btn btn-sm rounded-pill px-4 text-white" style="background-color: #28a745;">報名</button>
          <div class="mt-2">
            <a href="#" onclick="shareToLine('春季成人主日學', 'E2026002')" class="text-success text-decoration-none fw-bold" style="font-size:0.85rem;">
              <i class="fab fa-line fa-lg"></i> 邀請朋友
            </a>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
  // ==========================================
  // 功能 1：LINE 邀請朋友實作
  // ==========================================
  function shareToLine(eventName, eventId) {
    // 假設這是您的 LIFF 網址
    const myLiffUrl = "https://liff.line.me/2009444508-qaGGdlps?page=events";
    const text = `平安！教會即將舉辦【${eventName}】，誠摯邀請你一起來參加！\n點擊下方連結即可快速報名：\n${myLiffUrl}`;
    
    // 使用 encodeURIComponent 確保中文網址正確轉換
    const lineUrl = `https://line.me/R/msg/text/?${encodeURIComponent(text)}`;
    
    // 開啟 LINE App
    window.open(lineUrl, '_blank');
  }

  // ==========================================
  // 功能 2：代禱儀式感動畫實作
  // ==========================================
  function testSubmitPrayer() {
    const inputText = document.getElementById('test-prayer-input').value;
    if (!inputText) {
      Swal.fire('提醒', '請先輸入代禱內容喔！', 'warning');
      return;
    }

    // 1. 抓取 DOM 元素
    const overlay = document.getElementById('ritual-overlay');
    const textElement = document.getElementById('ritual-prayer-text');
    const doveIcon = document.getElementById('ritual-dove');
    const scripture = document.getElementById('ritual-scripture');
    const container = document.getElementById('ritual-anim-container');

    // 2. 初始化狀態
    textElement.innerText = `"${inputText}"`;
    textElement.style.opacity = 1;
    doveIcon.style.opacity = 0;
    scripture.style.opacity = 0;
    scripture.classList.remove('scripture-show'); // 重置經文動畫
    
    // 重新觸發飛翔動畫 (用小技巧重新賦予 class)
    container.style.animation = 'none';
    void container.offsetWidth; 
    container.style.animation = 'flyToLight 5s ease-in-out forwards';

    // 3. 顯示全螢幕光芒遮罩
    overlay.style.display = 'flex';
    setTimeout(() => { overlay.style.opacity = 1; }, 50);

    // 4. 動畫時序控制
    // 1.5 秒後：祈禱文字淡出，白鴿顯現 (象徵祈求化為白鴿升天)
    setTimeout(() => {
      textElement.style.opacity = 0;
      doveIcon.style.opacity = 1;
    }, 1500);

    // 觸發經文浮現動畫
    setTimeout(() => {
      scripture.classList.add('scripture-show');
    }, 50);

    // 5. 動畫結束 (約 6.5 秒)，隱藏遮罩，顯示成功提示
    setTimeout(() => {
      overlay.style.opacity = 0;
      setTimeout(() => { 
        overlay.style.display = 'none'; 
        document.getElementById('test-prayer-input').value = ''; // 清空輸入框
        
        // 恢復一般系統的 SweetAlert
        Swal.fire('阿們！', '您的代禱事項已蒙垂聽並成功送出。', 'success');
      }, 1000);
    }, 6500);
  }
</script>

<style>
  /* 讓倒數天數有閃爍效果，增加急迫感 */
  @keyframes pulse {
    0% { opacity: 1; }
    50% { opacity: 0.5; }
    100% { opacity: 1; }
  }
</style>
</body>
</html>
