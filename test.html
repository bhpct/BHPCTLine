<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>門徒培育系統 - 視覺完美對位測試</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { background-color: #f4f6f9; padding: 20px; font-family: '微軟正黑體', sans-serif; }
    .preview-card { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
  </style>
</head>
<body>

<div class="container">
  <h4 class="text-center text-primary fw-bold mb-5">門徒培育系統 - 視覺與雷達圖完美對位預覽</h4>
  
  <div class="row justify-content-center">
    
    <div class="col-md-6 col-lg-5">
      <div class="preview-card text-center h-100">
        <h5 class="fw-bold mb-4" style="color: #2c3e50;">一領一 門徒培育系統</h5>
        
        <svg viewBox="0 0 600 600" width="100%" height="auto" style="max-width: 450px; filter: drop-shadow(0px 8px 12px rgba(0,0,0,0.15));">
          <defs>
            <linearGradient id="gradRed" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#e74c3c"/><stop offset="100%" stop-color="#c0392b"/></linearGradient>
            <linearGradient id="gradGreen" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#2ecc71"/><stop offset="100%" stop-color="#218838"/></linearGradient>
            <linearGradient id="gradOrange" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#f39c12"/><stop offset="100%" stop-color="#d68910"/></linearGradient>
            <linearGradient id="gradPurple" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#9b59b6"/><stop offset="100%" stop-color="#8e44ad"/></linearGradient>
            
            <path id="arrow_shape" d="M -20 -60 L -20 -130 L -40 -130 L 0 -190 L 40 -130 L 20 -130 L 20 -60 Z" />
          </defs>

          <g transform="translate(300,300)">
            
            <circle cx="0" cy="0" r="145" fill="rgba(44, 62, 80, 0.04)" stroke="#e0e0e0" stroke-width="2"/>
            
            <use href="#arrow_shape" fill="url(#gradRed)" />
            <circle cx="0" cy="-120" r="35" fill="#fff" stroke="#c0392b" stroke-width="4"/>
            <text x="0" y="-112" font-size="22" font-weight="bold" fill="#c0392b" text-anchor="middle">服事</text>
            <text x="0" y="-205" font-size="16" font-weight="bold" fill="#c0392b" text-anchor="middle">參與事奉</text>

            <use href="#arrow_shape" fill="url(#gradGreen)" transform="rotate(90)" />
            <circle cx="120" cy="0" r="35" fill="#fff" stroke="#218838" stroke-width="4"/>
            <text x="120" y="8" font-size="22" font-weight="bold" fill="#218838" text-anchor="middle">造就</text>
            <text x="205" y="6" font-size="16" font-weight="bold" fill="#218838" text-anchor="start">靈命培育</text>

            <use href="#arrow_shape" fill="url(#gradOrange)" transform="rotate(180)" />
            <circle cx="0" cy="120" r="35" fill="#fff" stroke="#d68910" stroke-width="4"/>
            <text x="0" y="128" font-size="22" font-weight="bold" fill="#d68910" text-anchor="middle">尋羊</text>
            <text x="0" y="215" font-size="16" font-weight="bold" fill="#d68910" text-anchor="middle">建立關係</text>

            <use href="#arrow_shape" fill="url(#gradPurple)" transform="rotate(270)" />
            <circle cx="-120" cy="0" r="35" fill="#fff" stroke="#8e44ad" stroke-width="4"/>
            <text x="-120" y="8" font-size="22" font-weight="bold" fill="#8e44ad" text-anchor="middle">見證</text>
            <text x="-205" y="6" font-size="16" font-weight="bold" fill="#8e44ad" text-anchor="end">宣揚福音</text>
            
            <circle cx="0" cy="0" r="50" fill="#fff" stroke="#2c3e50" stroke-width="3"/>
            
            <g transform="translate(0, -5)">
              <circle cx="0" cy="-15" r="12" fill="#2c3e50"/> <path d="M -18 12 C -18 -5, 18 -5, 18 12 Z" fill="#2c3e50"/> <text x="0" y="32" font-size="16" font-weight="bold" fill="#2c3e50" text-anchor="middle">門徒培育</text>
            </g>

          </g>
        </svg>

      </div>
    </div>

    <div class="col-md-6 col-lg-5">
      <div class="preview-card text-center h-100">
        <h5 class="fw-bold mb-4" style="color: #2c3e50;">門徒均衡度分析</h5>
        <div style="position: relative; height: 320px; width: 100%;">
          <canvas id="radarChart"></canvas>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
  document.addEventListener("DOMContentLoaded", function() {
    const ctx = document.getElementById('radarChart').getContext('2d');
    
    // 模擬會友資料
    const mockData = {
      '服事': 5, 
      '造就': 8, 
      '尋羊': 3, 
      '見證': 6  
    };

    // 【修改重點】外圍標籤 (Labels) 不加括弧，保持版面乾淨
    const shortLabels = ['服事課程', '信徒課程', '一般活動', '福音活動'];
    
    // 定義完整的提示文字 (Tooltips)，當點擊色點時才顯示
    const fullTooltips = [
      '服事課程 (參與事奉)', 
      '信徒課程 (靈命培育)', 
      '一般活動 (建立關係)', 
      '福音活動 (宣揚福音)'
    ];

    const values = [mockData['服事'], mockData['造就'], mockData['尋羊'], mockData['見證']];

    new Chart(ctx, {
      type: 'radar',
      data: {
        labels: shortLabels, // 圖表外圍使用短標籤
        datasets: [{
          label: '參與次數',
          data: values,
          backgroundColor: 'rgba(52, 152, 219, 0.2)',
          borderColor: '#3498db',
          borderWidth: 2,
          pointBackgroundColor: ['#dc3545', '#28a745', '#f39c12', '#9b59b6'],
          pointBorderColor: '#fff',
          pointRadius: 6,
          pointHoverRadius: 8
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: {
          r: {
            startAngle: 0, 
            angleLines: { color: 'rgba(0, 0, 0, 0.15)' },
            grid: { color: 'rgba(0, 0, 0, 0.1)' },
            pointLabels: {
              font: { size: 14, family: '微軟正黑體', weight: 'bold' },
              color: function(context) {
                const colors = ['#dc3545', '#28a745', '#f39c12', '#9b59b6'];
                return colors[context.index];
              }
            },
            ticks: { display: false, stepSize: 2 } 
          }
        },
        plugins: {
          legend: { display: false },
          tooltip: {
            // 【修改重點】自訂 Tooltip 內容，讓滑鼠移過去時顯示完整文字
            callbacks: {
              title: function(tooltipItems) {
                // 回傳完整文字 (包含括弧)
                return fullTooltips[tooltipItems[0].dataIndex];
              },
              label: function(context) {
                return `已參與：${context.raw} 次`;
              }
            }
          }
        }
      }
    });
  });
</script>

</body>
</html>
