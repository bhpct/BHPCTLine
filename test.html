<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>門徒培育系統 - 進階功能與完美代禱動畫測試</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    body { background-color: #f4f6f9; font-family: '微軟正黑體', sans-serif; padding-bottom: 50px; }
    .card { border-radius: 15px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    
    /* ==========================================
       【神聖代禱動畫專屬 CSS】
       ========================================== */
    #ritual-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at 50% 15%, #ffffff 0%, #c1eaf9 60%, #1a2a3a 100%);
      z-index: 10500; display: none; flex-direction: column; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 1.5s ease-in-out;
    }
    
    /* 動畫容器 */
    .ritual-content {
      position: absolute; top: 55%; left: 50%; width: 100%; text-align: center;
      transform: translate(-50%, -50%);
    }
    
    /* 祈禱文字：位於下方，Z-index 較低，會被白鴿覆蓋 */
    .prayer-text-display {
      font-size: 1.4rem; color: #fff; font-style: italic; max-width: 85%; margin: 0 auto;
      text-shadow: 0 2px 5px rgba(0,0,0,0.6);
      position: relative; z-index: 1;
      opacity: 1; transform: scale(1);
    }
    
    /* 白鴿 Icon：位於中心，Z-index 較高，用來覆蓋文字 */
    .dove-icon {
      font-size: 9rem; color: white;
      filter: drop-shadow(0 0 25px rgba(255,255,255,1));
      position: absolute; top: 50%; left: 50%; 
      transform: translate(-50%, -50%);
      z-index: 5; opacity: 0;
    }

    /* 羅馬書經文 */
    .scripture-text {
      position: absolute; top: 35%; text-align: center; width: 100%;
      font-size: 1.8rem; font-weight: bold; color: #1a2a3a;
      text-shadow: 0 0 20px rgba(255,255,255,0.9);
      opacity: 0; transform: translateY(20px);
    }
    
    /* ==========================================
       【動畫時序控制 - 總時長 8 秒】
       ========================================== */
    
    /* 1. 文字動畫：先停留，然後慢慢縮小並淡出 */
    .anim-text { animation: textShrinkAndFade 8s forwards; }
    @keyframes textShrinkAndFade {
      0%, 15%   { transform: scale(1); opacity: 1; }      /* 0-1.2s: 保持原樣 */
      35%, 100% { transform: scale(0.3); opacity: 0; }    /* 2.8s: 縮小並消失 */
    }

    /* 2. 白鴿動畫：先浮現覆蓋文字，停留一陣子，再往上飛並縮小 */
    .anim-dove { animation: doveAppearAndFly 8s forwards; }
    @keyframes doveAppearAndFly {
      0%, 20%   { opacity: 0; transform: translate(-50%, -50%) scale(0.8); } /* 0-1.6s: 隱藏 */
      35%, 45%  { opacity: 1; transform: translate(-50%, -50%) scale(1.2); } /* 2.8s-3.6s: 完全浮現並放大覆蓋文字 */
      90%, 100% { opacity: 0; transform: translate(-50%, -80vh) scale(0.1); } /* 7.2s: 飛向高處光源並縮小消失 */
    }
    
    /* 3. 經文浮現動畫：在白鴿開始往上飛時浮現 */
    .scripture-show { animation: fadeUpIn 3s 4s forwards; }
    @keyframes fadeUpIn {
      to { opacity: 1; transform: translateY(0); }
    }

    /* 邀請朋友按鈕效果 */
    .share-line-btn {
      color: #28a745; text-decoration: none; font-weight: bold; font-size: 0.85rem; 
      transition: color 0.3s;
    }
    .share-line-btn:hover { color: #218838; }
  </style>
</head>
<body>

<div id="ritual-overlay">
  <div class="ritual-content" id="ritual-anim-container">
    <div class="prayer-text-display" id="ritual-prayer-text">"主啊，求您保守..."</div>
    <i class="fas fa-dove dove-icon" id="ritual-dove"></i>
  </div>
  <div class="scripture-text" id="ritual-scripture">
    「聖靈親自用說不出來的歎息<br>替我們禱告。」<br>
    <span style="font-size: 1.1rem; font-weight: normal; margin-top: 15px; display: inline-block;">— 羅馬書 8:26 —</span>
  </div>
</div>

<div class="container mt-4">
  <h4 class="text-center fw-bold mb-4 text-primary">進階功能與神聖動畫測試區</h4>

  <div class="card p-4 mb-5">
    <h5 class="mb-3 fw-bold text-dark"><i class="fas fa-praying-hands text-primary"></i> 測試【飛鴿代禱】細膩動畫</h5>
    <textarea class="form-control mb-3" id="test-prayer-input" rows="3" placeholder="請輸入您需要代禱的事項..."></textarea>
    <button class="btn btn-primary rounded-pill py-2" onclick="testSubmitPrayer()">送出代禱</button>
  </div>

  <div class="card p-4 mb-5 bg-light">
    <h5 class="mb-3 fw-bold text-dark"><i class="fas fa-calendar-alt text-success"></i> 測試活動卡片升級 (邀請功能與名額顯示)</h5>
    
    <div class="card p-3 shadow-sm border-0 mb-3" style="border-left: 5px solid #9b59b6;">
      <div class="d-flex justify-content-between align-items-start">
        <div>
          <span class="badge mb-2" style="background-color: #9b59b6;">福音活動</span>
          <h5 class="fw-bold mb-1 text-dark">
            2026 兒童夏令營
            <span class="badge bg-danger ms-2 align-middle" style="font-size:0.75rem;"><i class="fas fa-fire"></i> 剩 5 名</span>
          </h5>
          <div class="text-muted" style="font-size: 0.85rem;"><i class="far fa-calendar-alt w-20px"></i> 2026/07/15 ~ 07/18</div>
        </div>
        
        <div class="text-end">
          <div class="text-danger fw-bold mb-1" style="font-size: 0.8rem; animation: pulse 2s infinite;">
            <i class="fas fa-hourglass-half"></i> 剩餘 3 天
          </div>
          <button class="btn btn-sm rounded-pill px-4 text-white" style="background-color: #9b59b6;">報名</button>
          
          <div class="mt-2">
            <a href="#" onclick="shareToLine('2026 兒童夏令營', 'E2026001')" class="share-line-btn">
              <i class="fab fa-line fa-lg"></i> 邀請朋友
            </a>
          </div>
        </div>
      </div>
    </div>

    <div class="card p-3 shadow-sm border-0 mb-3" style="border-left: 5px solid #28a745;">
      <div class="d-flex justify-content-between align-items-start">
        <div>
          <span class="badge mb-2" style="background-color: #28a745;">信徒課程</span>
          <h5 class="fw-bold mb-1 text-dark">
            春季成人主日學
          </h5>
          <div class="text-muted" style="font-size: 0.85rem;"><i class="far fa-calendar-alt w-20px"></i> 2026/04/01 ~ 06/30</div>
        </div>
        
        <div class="text-end">
          <div class="text-danger fw-bold mb-1" style="font-size: 0.8rem;">
            <i class="fas fa-exclamation-circle"></i> 今日截止
          </div>
          <button class="btn btn-sm rounded-pill px-4 text-white" style="background-color: #28a745;">報名</button>
          <div class="mt-2">
            <a href="#" onclick="shareToLine('春季成人主日學', 'E2026002')" class="share-line-btn">
              <i class="fab fa-line fa-lg"></i> 邀請朋友
            </a>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
  // ==========================================
  // 功能 1：LINE 邀請朋友實作
  // ==========================================
  function shareToLine(eventName, eventId) {
    const myLiffUrl = "https://liff.line.me/2009444508-qaGGdlps?page=events";
    const text = `平安！教會即將舉辦【${eventName}】，誠摯邀請你一起來參加！\n點擊下方連結即可快速報名：\n${myLiffUrl}`;
    const lineUrl = `https://line.me/R/msg/text/?${encodeURIComponent(text)}`;
    window.open(lineUrl, '_blank');
  }

  // ==========================================
  // 功能 2：飛鴿代禱動畫實作 (細膩時序)
  // ==========================================
  function testSubmitPrayer() {
    const inputText = document.getElementById('test-prayer-input').value;
    if (!inputText) {
      Swal.fire('提醒', '請先輸入代禱內容喔！', 'warning');
      return;
    }

    const overlay = document.getElementById('ritual-overlay');
    const textElement = document.getElementById('ritual-prayer-text');
    const doveIcon = document.getElementById('ritual-dove');
    const scripture = document.getElementById('ritual-scripture');

    // 1. 初始化狀態與文字
    textElement.innerText = `"${inputText}"`;
    
    // 移除動畫 Class 以便重新觸發
    textElement.classList.remove('anim-text');
    doveIcon.classList.remove('anim-dove');
    scripture.classList.remove('scripture-show');
    
    // 強制重繪 DOM (Reflow)
    void textElement.offsetWidth; 
    
    // 顯示神聖光芒遮罩
    overlay.style.display = 'flex';
    setTimeout(() => { overlay.style.opacity = 1; }, 50);

    // 2. 加上動畫 Class，開始 8 秒鐘的神聖動畫
    setTimeout(() => {
      textElement.classList.add('anim-text');
      doveIcon.classList.add('anim-dove');
      scripture.classList.add('scripture-show');
    }, 100);

    // 3. 動畫結束 (8.5 秒)，隱藏遮罩，顯示結尾禱告詞
    setTimeout(() => {
      overlay.style.opacity = 0;
      setTimeout(() => { 
        overlay.style.display = 'none'; 
        document.getElementById('test-prayer-input').value = ''; // 清空輸入框
        
        // 正式且完整的結尾禱告詞
        Swal.fire({
          title: '奉耶穌基督的名祈禱，阿們！',
          text: '您的代禱事項已成功送出，將由牧者同工代禱。',
          icon: 'success',
          confirmButtonColor: '#0d6efd'
        });
      }, 1500);
    }, 8500);
  }
</script>

<style>
  @keyframes pulse {
    0% { opacity: 1; }
    50% { opacity: 0.5; }
    100% { opacity: 1; }
  }
</style>
</body>
</html>
